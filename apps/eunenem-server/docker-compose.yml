services:
  # Hono SSR app — serves both the user-facing React frontend and the
  # tRPC + BetterAuth + Stripe-webhook API. esbuild bakes the client
  # bundle at build time (STRIPE_PUBLISHABLE_KEY must be present then —
  # see Dockerfile + setup.ts:167-169 for the build-time-inline rationale).
  eunenem-server:
    build:
      # Repo root — Dockerfile COPYs both apps/eunenem-server/ AND src/
      # because the app uses relative cross-app imports (../../../../src/...).
      context: ../../
      dockerfile: apps/eunenem-server/Dockerfile
      args:
        STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    depends_on:
      eunenem-db:
        condition: service_healthy
    # Env wire-through: Dokploy writes its env block to `.env` at the build
    # context root, which the server reads via `tsx --env-file-if-exists=.env`
    # at PWD /app/apps/eunenem-server. BUT PID 1's environment stays bare,
    # so `docker exec ... pnpm db:migrate` (which inherits PID 1 env) falls
    # back to dev defaults → ECONNREFUSED. Wiring through here makes
    # docker-compose interpolate from Dokploy's .env at deploy-time AND
    # inject into the container env → docker exec inherits them.
    # See dokploy-api skill §12 "compose env layer-skip".
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - LOG_PII_HASH_SALT=${LOG_PII_HASH_SALT:-}
      - TRUSTED_HOP_COUNT=${TRUSTED_HOP_COUNT:-1}
      # Object storage for profile photos (aperture-0bgo3 / R5 aperture-kcasm).
      # Wired through here so the values reach the container's process.env
      # (Dokploy stores them in the compose-project .env; without this
      # interpolation they never cross into the running service — see the
      # dokploy-api skill "compose env layer-skip"). The S3 endpoint is the
      # PUBLIC per-stack MinIO domain (storage-eunenem.<host>) so browser
      # presigned PUTs reach it; MINIO_REGION is a placeholder MinIO ignores;
      # access/secret are a bucket-scoped key (PutObject+GetObject on
      # eunenem-perfil-fotos only). Bucket is public-read, presigned-write.
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-eunenem-perfil-fotos}

  # Postgres sidecar — holds the engine domain schema (Arrecadação,
  # Pagamentos, Financeiro, Usuário) + BetterAuth's tables (users,
  # sessions, accounts, verifications, rate_limit). Migrations live in
  # the engine repo root; run `pnpm db:migrate` against this DB after
  # first deploy and on every schema change.
  eunenem-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eunenem
      POSTGRES_USER: eunenem
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - eunenem-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "eunenem"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Minio sidecar — object storage for profile photos (R5 aperture-kcasm).
  # Bucket eunenem-perfil-fotos is provisioned (public-read, presigned-write);
  # eunenem-server now reads the MINIO_* vars above. Exposed publicly per
  # stack via the Dokploy domain storage-eunenem.<host> → :9000 so browser
  # presigned PUTs reach it. Console at :9001 for admin; data persists across
  # deploys via the named volume.
  eunenem-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - eunenem-minio-data:/data

volumes:
  eunenem-db-data:
  eunenem-minio-data:
